
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Führungsschienen Pro Dark</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary: #3498db; 
            --text: #e0e0e0;
            --accent: #27ae60;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1a1a;
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .nav button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav button.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 80px; 
            border: 1px solid var(--border);
        }

        h2 { color: var(--primary); margin-top: 0; font-size: 1.4rem; }
        label { display: block; margin: 15px 0 5px; color: #aaa; font-size: 0.9rem; }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 18px; 
            box-sizing: border-box;
        }

        button.main-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #252525;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            line-height: 1.6;
        }

        .highlight { color: var(--primary); font-weight: bold; font-size: 1.5rem; }

        /* Visu für Bohren */
        .visu-container {
            position: relative;
            width: 100%;
            height: 40px;
            background: #333;
            margin: 25px 0;
            border-radius: 6px;
        }
        .hole {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #ff4444;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .bar-bg { height: 12px; background: #333; border-radius: 6px; margin: 10px 0; }
        .bar-fill { height: 100%; background: var(--accent); border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div id="pageBohr" class="card">
    <h2>🔩 Bohr-Assistent</h2>
    
    <label>Gesamtlänge Schiene (cm)</label>
    <input type="number" id="bohrL" value="120" step="0.1" inputmode="decimal">

    <label>Start-Maß (1. Loch)</label>
    <div style="display: flex; align-items: center; gap: 15px; margin: 10px 0; background: #2a2a2a; padding: 10px; border-radius: 8px;">
        <input type="radio" id="s33" name="startM" value="3.3" checked style="width:20px; height:20px; accent-color: var(--primary);">
        <label for="s33" style="margin:0; cursor:pointer;">3.3 cm</label>
        
        <input type="radio" id="s15" name="startM" value="15" style="width:20px; height:20px; accent-color: var(--primary); margin-left: 15px;">
        <label for="s15" style="margin:0; cursor:pointer;">15.0 cm</label>
    </div>

    <button class="main-btn" onclick="calcBohr()">BERECHNEN</button>
    
    <div id="resBohr" style="display:none;">
        <div id="bohrVisu" class="visu-container"></div>
        <div id="bohrText" class="result"></div>
    </div>
</div>


    <div id="pageSchnitt" class="card" style="display:none;">
        <h2>🪚 Schnitt-Optimierung</h2>
        <label>Rohmaterial Länge (cm)</label>
        <input type="number" id="schienL" value="600" inputmode="decimal">
        <label>Teile (z.B. 4x120, 85.5)</label>
        <textarea id="teileInput" rows="3">3x150, 2x80</textarea>
        <button class="main-btn" onclick="calcSchnitt()">Schnittplan erstellen</button>
        <div id="resSchnitt" class="result" style="display:none;"></div>
    </div>

    <div id="pageSchraube" class="card" style="display:none;">
        <h2>📦 Pack-Liste für Heinz von Heiden</h2>
        <label>Lange Schienen (6 Schr. pro Paar)</label>
        <input type="number" id="countLang" value="0" inputmode="numeric" oninput="calcSchrauben()">
        
        <label>Kurze Schienen (4 Schr. pro Paar)</label>
        <input type="number" id="countKurz" value="0" inputmode="numeric" oninput="calcSchrauben()">
        
        <div id="resSchraube" class="result" style="margin-top:30px; text-align:center;">
            Gesamtanzahl Schrauben:<br>
            <span id="totalSchrauben" class="highlight" style="font-size:3rem;">0</span> <br>Stück
        </div>
    </div>
</div>
<div id="pageRal" class="card" style="display:none;">
    <h2>🎨 RAL Farbwähler</h2>
    <input type="text" id="ralSearch" placeholder="Nummer oder Name suchen..." oninput="searchRal()" 
           style="margin-bottom: 15px; border-color: var(--primary);">
    
    <div id="ralList" style="max-height: 450px; overflow-y: auto; padding-right: 5px;">
        </div>
</div>

<div class="nav">
    <button id="btnBohr" class="active" onclick="showPage('bohr')">BOHREN</button>
    <button id="btnSchnitt" onclick="showPage('schnitt')">SÄGEN</button>
    <button id="btnSchraube" onclick="showPage('schraube')">PACKEN</button>
    <button id="btnRal" onclick="showPage('ral')">RAL</button>
</div>


<script>
    function showPage(p) {
        document.getElementById('pageBohr').style.display = p === 'bohr' ? 'block' : 'none';
        document.getElementById('pageSchnitt').style.display = p === 'schnitt' ? 'block' : 'none';
        document.getElementById('pageSchraube').style.display = p === 'schraube' ? 'block' : 'none';
        
        document.getElementById('btnBohr').className = p === 'bohr' ? 'active' : '';
        document.getElementById('btnSchnitt').className = p === 'schnitt' ? 'active' : '';
        document.getElementById('btnSchraube').className = p === 'schraube' ? 'active' : '';
        window.scrollTo(0,0);
    }

    function calcSchrauben() {
        let lang = parseInt(document.getElementById('countLang').value) || 0;
        let kurz = parseInt(document.getElementById('countKurz').value) || 0;
        let gesamt = (lang * 6) + (kurz * 4);
        document.getElementById('totalSchrauben').innerText = gesamt;
    }

    // ... (Die Funktionen calcBohr und calcSchnitt bleiben wie gehabt) ...
    function calcBohr() {
    let L = parseFloat(document.getElementById('bohrL').value);
    
    // Hier prüfen wir, welcher Radio-Button aktiv ist
    let start = document.getElementById('s15').checked ? 15.0 : 3.3;
    
    let ende = L - 15; // Das Endmaß bleibt fix bei L - 15
    let n = L < 70 ? 2 : L < 130 ? 3 : L < 170 ? 4 : L < 210 ? 5 : 5;
    
    let pos = [];
    if (n === 1) {
        pos.push(start);
    } else {
        let step = (ende - start) / (n - 1);
        for(let i=0; i<n; i++) {
            pos.push(start + i*step);
        }
    }
    
    document.getElementById('resBohr').style.display = 'block';
    let visu = document.getElementById('bohrVisu');
    visu.innerHTML = '';
    pos.forEach(p => {
        let dot = document.createElement('div');
        dot.className = 'hole';
        dot.style.left = (p/L*100) + '%';
        visu.appendChild(dot);
    });

    let abstand = n > 1 ? ((ende-start)/(n-1)).toFixed(2) : '---';
    document.getElementById('bohrText').innerHTML = `
        Startpunkt: <span class="highlight">${start} cm</span><br>
        Anzahl Löcher: <span class="highlight">${n} Stk</span><br>
        Loch-zu-Loch: <span class="highlight">${abstand} cm</span><hr style="border:0; border-top:1px solid #444;">
        <b>Kettenmaß:</b><br>
        1. Loch bei: ${start} cm<br>
        ${n > 1 ? `Dann jeweils <span style="color:var(--accent)">+ ${abstand} cm</span>` : ''}
    `;
}


    function calcSchnitt() {
        let lager = parseFloat(document.getElementById('schienL').value);
        let nutzbar = lager - 3;
        let saege = 0.3;
        let input = document.getElementById('teileInput').value;
        let teile = [];
        input.replace(/,/g, ' ').split(/\s+/).forEach(d => {
            if(d.includes('x')) {
                let [anz, m] = d.split('x');
                for(let i=0; i<parseInt(anz); i++) teile.push(parseFloat(m));
            } else if(d) teile.push(parseFloat(d));
        });
        teile.sort((a,b) => b-a);
        let schienen = [];
        teile.forEach(t => {
            let gepackt = false;
            for(let s of schienen) {
                let belegt = s.reduce((a,b) => a+b, 0) + (s.length * saege);
                if(belegt + t <= nutzbar) { s.push(t); gepackt = true; break; }
            }
            if(!gepackt) schienen.push([t]);
        });
        let res = document.getElementById('resSchnitt');
        res.style.display = 'block';
        let html = `Bedarf: <span class="highlight">${schienen.length} Schienen</span><br><br>`;
        schienen.forEach((s, i) => {
            let sum = s.reduce((a,b) => a+b, 0) + (s.length-1)*saege;
            html += `<b>Schiene ${i+1}:</b> ${s.join(' | ')} cm<br><div class="bar-bg"><div class="bar-fill" style="width:${(sum/nutzbar*100)}%"></div></div><small>Rest: ${(nutzbar-sum).toFixed(1)} cm</small><br><br>`;
        });
        res.innerHTML = html;
    }
  const ralColors = [
    {n:"1000", name:"Grünbeige", hex:"#BEBD7F"}, {n:"1001", name:"Beige", hex:"#C2B078"},
    {n:"1013", name:"Perlweiß", hex:"#EAE6CA"}, {n:"1015", name:"Hellelfenbein", hex:"#E6D690"},
    {n:"1021", name:"Rapsgelb", hex:"#F3DA0B"}, {n:"2004", name:"Reinorange", hex:"#E15501"},
    {n:"3000", name:"Feuerrot", hex:"#AF2B1E"}, {n:"3003", name:"Rubinrot", hex:"#820616"},
    {n:"3005", name:"Weinrot", hex:"#5E2129"}, {n:"5002", name:"Ultramarinblau", hex:"#073E87"},
    {n:"5010", name:"Enzianblau", hex:"#0E467F"}, {n:"5012", name:"Lichtblau", hex:"#3481B8"},
    {n:"6005", name:"Moosgrün", hex:"#2F4538"}, {n:"6009", name:"Tannengrün", hex:"#213024"},
    {n:"7001", name:"Silbergrau", hex:"#8F999F"}, {n:"7011", name:"Eisengrau", hex:"#434B4D"},
    {n:"7016", name:"Anthrazitgrau", hex:"#383E42"}, {n:"7021", name:"Schwarzgrau", hex:"#2F353B"},
    {n:"7035", name:"Lichtgrau", hex:"#D7D7D7"},{n:"7039", name:"Quarzgrau", hex:"#6B695F"},{n:"7040", name:"Fenstergrau", hex:"#999999"},
    {n:"8017", name:"Schokobraun", hex:"#45322E"},{n:"8077", name:"Schwarzbraun", hex:"#3E312C"},{n:"9001", name:"Cremeweiß", hex:"#FDF4E3"},
    {n:"9002", name:"Grauweiß", hex:"#E7EBDA"}, {n:"9003", name:"Signalweiß", hex:"#F4F4F4"},
    {n:"9005", name:"Tiefschwarz", hex:"#0A0A0A"}, {n:"9006", name:"Weißaluminium", hex:"#A5A5A5"},
    {n:"9007", name:"Graualuminium", hex:"#8F8F8F"}, {n:"9010", name:"Reinweiß", hex:"#F4F4F4"},
    {n:"9016", name:"Verkehrsweiß", hex:"#F6F6F6"}
    
    // Hinweis: Dies ist eine Auswahl der wichtigsten. 
    // Für alle 213 Farben wäre der Code hier zu lang, 
    // aber du kannst dieses Muster beliebig erweitern!
];

function searchRal() {
    let q = document.getElementById('ralSearch').value.toLowerCase();
    let list = document.getElementById('ralList');
    list.innerHTML = '';
    
    ralColors.filter(c => c.n.includes(q) || c.name.toLowerCase().includes(q)).forEach(c => {
        let div = document.createElement('div');
        div.style = "display:flex; align-items:center; background:#252525; margin-bottom:8px; padding:12px; border-radius:10px; border:1px solid #333;";
        div.innerHTML = `
            <div style="width:50px; height:50px; background:${c.hex}; border-radius:8px; margin-right:15px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);"></div>
            <div style="flex:1;">
                <div style="color:var(--primary); font-weight:bold; font-size:1.1rem;">RAL ${c.n}</div>
                <div style="color:#aaa; font-size:0.9rem;">${c.name}</div>
            </div>
            <div style="color:#555; font-size:0.7rem;">${c.hex}</div>
        `;
        list.appendChild(div);
    });
}

// Damit die Seite beim ersten Klick nicht leer ist:
setTimeout(searchRal, 100);

// Vergiss nicht, die showPage Funktion um 'ral' zu erweitern:
function showPage(p) {
    const pages = ['pageBohr', 'pageSchnitt', 'pageSchraube', 'pageRal'];
    const buttons = ['btnBohr', 'btnSchnitt', 'btnSchraube', 'btnRal'];
    
    pages.forEach(id => document.getElementById(id).style.display = 'none');
    buttons.forEach(id => document.getElementById(id).classList.remove('active'));
    
    document.getElementById('page' + p.charAt(0).toUpperCase() + p.slice(1)).style.display = 'block';
    document.getElementById('btn' + p.charAt(0).toUpperCase() + p.slice(1)).classList.add('active');
    window.scrollTo(0,0);
}

</script>
</body>
</html>
